<div class="newsletter">
  <div class="newsletter__inset">
    <div class="newsletter__body">
      <div class="newsletter__kicker">The newsletter</div>
      <h2>Big data, minus the noise.</h2>
      <p class="newsletter__lede">Tutorials, engineering walkthroughs, book picks, and open-source finds &mdash; sent occasionally, only when there's something worth reading.</p>
      <form class="signup" action="https://app.99inbound.com/api/e/K-wp0Mrv" method="post" name="mc-embedded-subscribe-form" target="_blank" novalidate>
        <div style="position: absolute; left: -5000px;" aria-hidden="true">
          <input type="checkbox" name="messy_green_spotted_mission" value="1" tabindex="-1" autocomplete="no">
        </div>
        <input type="hidden" value="{{ include.source }}" name="SOURCE" id="SOURCE" />
        <input type="email" name="EMAIL" placeholder="you@example.com" required />
        <button type="submit" name="subscribe">Subscribe</button>
      </form>
      <div class="newsletter__fineprint">100% privacy. Unsubscribe anytime.</div>
    </div>
  </div>
</div>
