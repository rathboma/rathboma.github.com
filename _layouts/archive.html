<div class="wrap-medium page-body">
  <p class="kicker">Archive</p>
  <h1>{% if page.title %}{{ page.title }}{% else %}Blog Posts{% endif %}</h1>
  <div class="topic-chips" style="margin-bottom:36px">

    <a class="chip {% if page.topicsactive %}is-active{% endif %}" href="/archive/topics.html">By topic</a>
  </div>
  {{ content }}
</div>
